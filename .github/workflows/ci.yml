name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 gives the full history the shortcut scan needs to diff the
      # push/PR against its base; the default shallow clone has no base commit.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # The no-shortcuts scanner, the same one the pre-commit and Stop hooks run, but
      # over exactly the range this push or PR introduces. It is the only check that is
      # otherwise local-only (a --no-verify commit or a clone that never set
      # core.hooksPath would slip past the hook), so CI is what makes it unskippable.
      - name: Shortcut scan
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.before }}"
          fi
          # A new branch or an unavailable base has no usable "before"; fall back to
          # the previous commit so the scan still covers the latest change.
          if [ -z "$base" ] || ! git cat-file -e "$base^{commit}" 2>/dev/null; then
            base="$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)"
          fi
          sh scripts/check-shortcuts.sh --range "$base...HEAD"
      # rustup on the runner honors rust-toolchain.toml and fetches the pinned version.
      - run: rustup component add rustfmt clippy
      # Cache the cargo registry and target dir keyed on Cargo.lock + the toolchain, so
      # the heavy dependency tree (wgpu, egui, naga, …) compiles once and later runs only
      # rebuild the changed crates. Without it every run is a full clean build.
      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
      # --workspace on every step so CI always covers all crates, regardless of
      # any future default-members.
      - name: Format
        run: cargo fmt --all -- --check
      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Build
        run: cargo build --workspace --verbose
      - name: Test
        run: cargo test --workspace --verbose
      # The node reference is generated from the running binary's registry. Regenerate it and fail
      # if the committed pages drift (modified or missing), so docs/reference/nodes/ can never fall
      # out of sync with the nodes. `git status --porcelain` catches a new node's page too, which a
      # plain `git diff` would miss.
      - name: Docs generate + drift check
        run: |
          cargo xtask docs-gen
          if [ -n "$(git status --porcelain -- docs/reference/nodes/)" ]; then
            echo "Generated node pages are out of date; run 'cargo xtask docs-gen' and commit:"
            git status --porcelain -- docs/reference/nodes/
            exit 1
          fi
      # Lint the docs: orphaned or invalid fragments, broken links, missing figures, forbidden
      # markers, relative design/ links, and completeness gaps on pages marked stable.
      - name: Docs lint
        run: cargo xtask docs-lint
