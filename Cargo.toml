[workspace]
resolver = "3"
members = ["crates/*"]
# No `default-members`: bare `cargo test`/`build`/`clippy` must cover the whole
# workspace, not one crate. Bare `cargo run` still resolves to ymir-cli on its own
# while it is the only binary; revisit (a `-p` or `default-run`) once ymir-gui adds
# a second binary.

[workspace.package]
edition = "2024"
license = "GPL-3.0-only"
authors = ["Oluf Andrews <oluf@oandrews.com>"]
rust-version = "1.95"

# Lint policy lives here so every crate inherits it with `[lints] workspace = true`.
# The `cargo clippy --all-targets -- -D warnings` gate then turns these into hard
# errors, which is how `missing_docs` and the no-unsafe rule are enforced.
[workspace.lints.rust]
unsafe_code = "forbid"
missing_docs = "warn"
